name: BlitztextMac
options:
  bundleIdPrefix: app.blitztext
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ONLY_ACTIVE_ARCH: NO
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "15"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    exactVersion: 0.18.0

targets:
  BlitztextMac:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Features
      - path: Services
      - path: Views
      - path: Resources
        buildPhase: resources
        excludes:
          - AppIcon.icns
          - Info.plist
          - BlitztextMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blitztext.mac
        PRODUCT_NAME: Blitztext
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: Resources/BlitztextMac.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    entitlements:
      path: Resources/BlitztextMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  BlitztextiOS:
    type: application
    platform: iOS
    sources:
      - path: ../BlitztextiOS/App
      - path: ../BlitztextShared
      - path: ../BlitztextiOS/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - BlitztextiOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blitztext.ios
        PRODUCT_NAME: Blitztext
        INFOPLIST_FILE: ../BlitztextiOS/Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: ../BlitztextiOS/Resources/BlitztextiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BlitztextKeyboard
        embed: true
    entitlements:
      path: ../BlitztextiOS/Resources/BlitztextiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.blitztext.shared

  BlitztextKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ../BlitztextKeyboard
        excludes:
          - Resources/Info.plist
          - Resources/BlitztextKeyboard.entitlements
      - path: ../BlitztextShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blitztext.ios.keyboard
        PRODUCT_NAME: BlitztextKeyboard
        INFOPLIST_FILE: ../BlitztextKeyboard/Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: ../BlitztextKeyboard/Resources/BlitztextKeyboard.entitlements
    entitlements:
      path: ../BlitztextKeyboard/Resources/BlitztextKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.blitztext.shared
